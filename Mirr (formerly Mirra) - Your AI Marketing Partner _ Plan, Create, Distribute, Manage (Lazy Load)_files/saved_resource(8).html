    }
    [data-editable-id]:active {

    }
    [data-editable-id][contenteditable="true"] {
      cursor: text !important;
      outline: 2px solid #8b5cf6 !important;
      outline-offset: 2px !important;

    }
  `;
  document.head.appendChild(style);
})();
